dataset_path: sghosts/cf_gsm8k_1k_train
dataset_split: train
output_dir: /content/drive/MyDrive/chained-flow/vae/ckpts/hidden-vae-smoke

vae_type: residual_mlp
hidden_size: 1024
latent_size: 256
intermediate_size: 512
device: cuda

tokens_per_epoch: 1024
token_seed: 0
response_only: true

lambda_mse: 1.0
lambda_cos: 0.2
lambda_norm: 0.0 # cheating
beta: 0.0001
free_bits: 0.0

per_device_train_batch_size: 32
num_train_epochs: 20 # overfit
learning_rate: 0.0001
logging_steps: 10
save_steps: 100
save_total_limit: 2
report_to: none
logging_steps: 1
